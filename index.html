<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IoT World Cup Runner 🏆⚽</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0d1117; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace; user-select: none; -webkit-user-select: none; }
        #game-container { box-shadow: 0 10px 35px rgba(234, 179, 8, 0.4); border-radius: 12px; overflow: hidden; border: 4px solid #eab308; max-width: 100%; max-height: 100%; }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
    const AudioSynth = {
        ctx: null,
        init() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        playStartWhistle() { if (!this.ctx) this.init(); let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination); osc.frequency.setValueAtTime(800, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(1300, this.ctx.currentTime + 0.15); gain.gain.setValueAtTime(0.3, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5); osc.start(); osc.stop(this.ctx.currentTime + 0.5); },
        playJump() { if (!this.ctx) this.init(); let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination); osc.frequency.setValueAtTime(180, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(550, this.ctx.currentTime + 0.12); gain.gain.setValueAtTime(0.15, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15); osc.start(); osc.stop(this.ctx.currentTime + 0.15); },
        playGoalScore() { if (!this.ctx) this.init(); let now = this.ctx.currentTime; [330, 440, 554, 660].forEach((freq, index) => { let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination); osc.frequency.setValueAtTime(freq, now + (index * 0.08)); gain.gain.setValueAtTime(0.2, now + (index * 0.08)); gain.gain.exponentialRampToValueAtTime(0.01, now + (index * 0.08) + 0.15); osc.start(now + (index * 0.08)); osc.stop(now + (index * 0.08) + 0.15); }); },
        playGameOver() { if (!this.ctx) this.init(); let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination); osc.frequency.setValueAtTime(550, this.ctx.currentTime); osc.frequency.linearRampToValueAtTime(100, this.ctx.currentTime + 0.6); gain.gain.setValueAtTime(0.3, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.6); osc.start(); osc.stop(this.ctx.currentTime + 0.6); }
    };

    const config = { type: Phaser.AUTO, width: 850, height: 400, parent: 'game-container', scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }, physics: { default: 'arcade', arcade: { gravity: { y: 1450 }, debug: false } }, scene: { preload: preload, create: create, update: update } };
    const game = new Phaser.Game(config);

    let player, ground, cursors, spaceKey, itemsGroup, obstaclesGroup, robotGroup, cloudsGroup, flagsGroup, crowdGroup, certificate;
    let collectedItems = { arduino: 0, sensor: 0, pump: 0 };
    
    const TARGET_COUNT = 5; 
    // ==========================================
    // 🛠️ تم إبطاء السرعة هنا من -530 إلى -400 لتصبح اللعبة أسهل
    // ==========================================
    let gameSpeed = -400; 
    let isGameOver = false;
    let gameStarted = false; 
    let startScreenContainer, componentText;
    let playerName = "Player";
    let nextSpawnTime = 0;

    function preload() {
        this.load.image('iot_engineer', 'mario.png');
        this.load.image('arduino_board', 'arduino.png');     
        this.load.image('sensor_module', 'sensor.png');       
        this.load.image('water_pump', 'waterpump.webp');     
        this.load.image('world_cup_trophy', 'world_cup.png'); 
    }

    function create() {
        createGameTextures(this);
        this.add.rectangle(425, 200, 850, 400, 0x0f172a); 
        crowdGroup = this.physics.add.group({ allowGravity: false });
        for (let i = 40; i < 900; i += 80) spawnCrowdSegment(this, i);
        
        flagsGroup = this.physics.add.group({ allowGravity: false });
        let flagKeys = ['flag_qatar', 'flag_argentina', 'flag_brazil', 'flag_portugal', 'flag_france'];
        for (let i = 80; i < 900; i += 180) spawnFlag(this, i, Phaser.Math.RND.pick(flagKeys));
        
        cloudsGroup = this.physics.add.group({ allowGravity: false });
        for (let i = 0; i < 3; i++) spawnCloud(this, Phaser.Math.Between(100, 800));
        ground = this.physics.add.staticGroup();
        ground.create(425, 380, 'stadium_grass').setScale(2.2, 2).refreshBody();
        
        player = this.physics.add.sprite(150, 300, 'iot_engineer');
        player.setCollideWorldBounds(true);
        player.setGravityY(550);
        player.setDisplaySize(40, 48); 
        
        cursors = this.input.keyboard.createCursorKeys();
        spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
        this.input.on('pointerdown', function () { if (gameStarted && !isGameOver) handleJump(); });
        itemsGroup = this.physics.add.group({ allowGravity: false });
        obstaclesGroup = this.physics.add.group({ allowGravity: false });
        robotGroup = this.physics.add.group({ allowGravity: false });
        
        this.physics.add.collider(player, ground);
        this.physics.add.overlap(player, itemsGroup, collectItem, null, this);
        this.physics.add.overlap(player, obstaclesGroup, hitHazard, null, this);
        this.physics.add.overlap(player, robotGroup, hitRobot, null, this);
        
        componentText = this.add.text(16, 20, `Arduino [0/${TARGET_COUNT}]  Sensor [0/${TARGET_COUNT}]  Pump [0/${TARGET_COUNT}]`, { fontSize: '18px', fill: '#fbbf24', fontFamily: 'monospace', fontWeight: 'bold' }).setVisible(false);
        showStartScreen(this);
    }

    function handleJump() {
        if (player.body.touching.down) {
            // ==========================================
            // 🛠️ تم تعديل قوة القفزة من -670 إلى -610 لتتناسب مع السرعة الأبطأ
            // ==========================================
            player.setVelocityY(-610);
            AudioSynth.playJump();
        }
    }

    function update(time) {
        if (!gameStarted) { player.setVelocityX(0); return; }
        if (isGameOver) return;
        player.setVelocityX(0);
        if (Phaser.Input.Keyboard.JustDown(cursors.up) || Phaser.Input.Keyboard.JustDown(spaceKey)) handleJump();
        
        if (time > nextSpawnTime) {
            spawnNextEntity(this);
            // تم زيادة وقت الانتظار بين العقبات قليلاً لكي لا تزدحم الشاشة بالسرعة الجديدة
            nextSpawnTime = time + Phaser.Math.Between(900, 1400);
        }

        cloudsGroup.children.iterate(function (cloud) { if (cloud && cloud.x < -120) cloud.destroy(); });
        flagsGroup.children.iterate(function (flag) { if (flag && flag.x < -100) flag.x = 950; });
        crowdGroup.children.iterate(function (segment) { if (segment && segment.x < -100) segment.x = 950; });
        cleanUpGroup(itemsGroup); cleanUpGroup(obstaclesGroup); cleanUpGroup(robotGroup);
    }

    function spawnCrowdSegment(scene, startX) { let segment = crowdGroup.create(startX, 305, 'stadium_crowd'); if (gameStarted) segment.setVelocityX(gameSpeed * 0.3); }

    function showStartScreen(scene) {
        startScreenContainer = scene.add.container(425, 200);
        let panel = scene.add.rectangle(0, 0, 520, 270, 0x7f1d1d, 0.95).setStrokeStyle(4, 0xf59e0b);
        let menuTitle = scene.add.text(0, -80, '🏆 IoT WORLD CUP RUNNER 🏆', { fontSize: '22px', fill: '#fbbf24', fontFamily: 'monospace', fontWeight: 'bold' }).setOrigin(0.5);
        let startButton = scene.add.rectangle(0, 75, 220, 45, 0x22c55e).setInteractive({ useHandCursor: true }).setStrokeStyle(2, 0xffffff);
        let startButtonText = scene.add.text(0, 75, '💥 KICK OFF (START) 💥', { fontSize: '14px', fill: '#ffffff', fontFamily: 'monospace', fontWeight: 'bold' }).setOrigin(0.5);
        startButton.on('pointerdown', () => {
            let inputName = prompt("أدخل اسمك الثلاثي للمشاركة في مسابقة البوتكامب:");
            playerName = (inputName && inputName.trim() !== "") ? inputName : "لاعب مجهول";
            AudioSynth.playStartWhistle(); 
            startScreenContainer.destroy();
            startGame(scene);
        });
        startScreenContainer.add([panel, menuTitle, startButton, startButtonText]);
    }

    function startGame(scene) {
        gameStarted = true;
        componentText.setVisible(true);
        scene.time.addEvent({ delay: 4500, callback: () => spawnCloud(scene, 900), callbackScope: scene, loop: true });
    }

    function spawnFlag(scene, startX, flagKey) { let flag = flagsGroup.create(startX, 290, flagKey); if (gameStarted) flag.setVelocityX(gameSpeed * 0.4); }
    function spawnCloud(scene, startX) { if (isGameOver) return; let cloud = cloudsGroup.create(startX, Phaser.Math.Between(40, 110), 'neon_cloud'); if (gameStarted) cloud.setVelocityX(gameSpeed * 0.15); }
    function cleanUpGroup(group) { group.children.iterate(function (child) { if (child && child.x < -100) child.destroy(); }); }
    
    function spawnNextEntity(scene) {
        if (isGameOver) return;
        if (hasAllItems()) {
            if (!certificate) spawnCertificate(scene);
            return;
        }

        let choice = Phaser.Math.Between(1, 3);
        if (choice === 1) { 
            let spawnDouble = Phaser.Math.Between(0, 1) === 1; 
            if (spawnDouble) { 
                let c1 = obstaclesGroup.create(900, 335, 'cone_hazard'); 
                let c2 = obstaclesGroup.create(932, 335, 'cone_hazard'); 
                c1.setVelocityX(gameSpeed); c2.setVelocityX(gameSpeed); 
            } else { 
                let c = obstaclesGroup.create(900, 335, 'cone_hazard'); 
                c.setVelocityX(gameSpeed); 
            } 
        } 
        else if (choice === 2) { 
            let robot = robotGroup.create(900, 325, 'patrol_robot'); 
            robot.setVelocityX(gameSpeed * 1.25); 
            scene.tweens.add({ targets: robot, y: 305, duration: 250, yoyo: true, repeat: -1 }); 
        } 
        else if (choice === 3) { 
            let pool = []; 
            if (collectedItems.arduino < TARGET_COUNT) pool.push('arduino_board'); 
            if (collectedItems.sensor < TARGET_COUNT) pool.push('sensor_module'); 
            if (collectedItems.pump < TARGET_COUNT) pool.push('water_pump'); 
            
            if (pool.length > 0) {
                let selectedKey = Phaser.Math.RND.pick(pool); 
                let item = itemsGroup.create(900, 310, selectedKey);
                item.setScale(0.15);
                item.setVelocityX(gameSpeed); 
                item.itemType = selectedKey; 
            } else {
                let c = obstaclesGroup.create(900, 335, 'cone_hazard'); 
                c.setVelocityX(gameSpeed);
            }
        }
    }
    
    function hasAllItems() { return (collectedItems.arduino >= TARGET_COUNT && collectedItems.sensor >= TARGET_COUNT && collectedItems.pump >= TARGET_COUNT); }
    function collectItem(player, item) { let type = item.itemType; item.destroy(); if (type === 'arduino_board') collectedItems.arduino++; if (type === 'sensor_module') collectedItems.sensor++; if (type === 'water_pump') collectedItems.pump++; AudioSynth.playGoalScore(); updateHUD(); }
    
    function spawnCertificate(scene) { 
        certificate = scene.physics.add.sprite(920, 315, 'world_cup_trophy'); 
        certificate.setScale(0.15); 
        certificate.body.allowGravity = false; 
        certificate.setVelocityX(gameSpeed); 
        scene.physics.add.overlap(player, certificate, winGame, null, scene); 
    }
    
    function updateHUD() { componentText.setText(`Arduino [${collectedItems.arduino}/${TARGET_COUNT}]  Sensor [${collectedItems.sensor}/${TARGET_COUNT}]  Pump [${collectedItems.pump}/${TARGET_COUNT}]`); if (hasAllItems()) componentText.setFill('#4ade80'); }
    
    function hitHazard(player, obstacle) { triggerGameOver(this, 'RED CARD! Tripped over hurdles.'); }
    function hitRobot(player, robot) { triggerGameOver(this, 'FOUL! Opponent robot tackled you.'); }
    function triggerGameOver(scene, message) { scene.physics.pause(); isGameOver = true; player.setTint(0xef4444); AudioSynth.playGameOver(); let overBg = scene.add.rectangle(425, 200, 500, 180, 0x7f1d1d, 0.95).setStrokeStyle(3, 0xef4444); scene.add.text(425, 160, 'GAME OVER', { fontSize: '22px', fill: '#ef4444', fontFamily: 'monospace', fontWeight: 'bold' }).setOrigin(0.5); scene.add.text(425, 200, message, { fontSize: '14px', fill: '#ffffff', fontFamily: 'monospace', align: 'center' }).setOrigin(0.5); scene.input.once('pointerdown', () => { location.reload(); }); }
    
    function winGame(player, cert) { 
        this.physics.pause(); 
        isGameOver = true; 
        player.setTint(0xf59e0b); 
        cert.destroy(); 
        AudioSynth.playGoalScore(); 
        let winBg = this.add.rectangle(425, 200, 600, 240, 0x065f46, 0.95).setStrokeStyle(4, 0xf59e0b); 
        this.add.text(425, 125, '🎉 CONGRATULATIONS! 🎉', { fontSize: '26px', fill: '#fbbf24', fontFamily: 'monospace', fontWeight: 'bold' }).setOrigin(0.5); 
        this.add.text(425, 175, 'CHAMPION: ' + playerName, { fontSize: '18px', fill: '#ffffff', fontFamily: 'monospace' }).setOrigin(0.5); 
        this.add.text(425, 230, 'Tap Screen to Restart', { fontSize: '14px', fill: '#38bdf8', fontFamily: 'monospace', fontWeight: 'bold' }).setOrigin(0.5); 
        this.input.once('pointerdown', () => { location.reload(); }); 
    }

    function createGameTextures(scene) {
        let g = scene.make.graphics({ x: 0, y: 0, add: false });
        g.fillStyle(0x334155); g.fillRect(0, 10, 80, 30); g.fillStyle(0x475569); g.fillRect(0, 20, 80, 20); g.fillStyle(0xdc2626); g.fillCircle(15, 8, 4); g.fillStyle(0x2563eb); g.fillCircle(30, 5, 4); g.fillStyle(0xeab308); g.fillCircle(45, 9, 4); g.fillStyle(0x16a34a); g.fillCircle(65, 6, 4); g.generateTexture('stadium_crowd', 80, 40);
        g.clear(); g.fillStyle(0x7f1d1d); g.fillRect(0, 0, 40, 26); g.fillStyle(0xffffff); g.fillRect(0, 0, 13, 26); g.beginPath(); for(let i=0; i<26; i+=4){g.moveTo(13, i); g.lineTo(17, i+2); g.lineTo(13, i+4);} g.fill(); g.fillStyle(0x334155); g.fillRect(0, 0, 2, 50); g.generateTexture('flag_qatar', 42, 50);
        g.clear(); g.fillStyle(0x38bdf8); g.fillRect(0, 0, 40, 26); g.fillStyle(0xffffff); g.fillRect(0, 8, 40, 10); g.fillStyle(0xf59e0b); g.fillCircle(20, 13, 3); g.fillStyle(0x334155); g.fillRect(0, 0, 2, 50); g.generateTexture('flag_argentina', 42, 50);
        g.clear(); g.fillStyle(0x15803d); g.fillRect(0, 0, 40, 26); g.fillStyle(0xeab308); g.fillTriangle(20, 3, 5, 13, 20, 23); g.fillTriangle(20, 3, 35, 13, 20, 23); g.fillStyle(0x1e3a8a); g.fillCircle(20, 13, 5); g.fillStyle(0x334155); g.fillRect(0, 0, 2, 50); g.generateTexture('flag_brazil', 42, 50);
        g.clear(); g.fillStyle(0x15803d); g.fillRect(0, 0, 16, 26); g.fillStyle(0xdc2626); g.fillRect(16, 0, 24, 26); g.fillStyle(0xeab308); g.fillCircle(16, 13, 4); g.fillStyle(0x334155); g.fillRect(0, 0, 2, 50); g.generateTexture('flag_portugal', 42, 50);
        g.clear(); g.fillStyle(0x1e3a8a); g.fillRect(0, 0, 13, 26); g.fillStyle(0xffffff); g.fillRect(13, 0, 14, 26); g.fillStyle(0xdc2626); g.fillRect(27, 0, 13, 26); g.fillStyle(0x334155); g.fillRect(0, 0, 2, 50); g.generateTexture('flag_france', 42, 50);
        g.clear(); g.fillStyle(0x15803d); g.fillRect(0, 0, 850, 40); g.fillStyle(0x16a34a); for(let i=0; i<850; i+=80){g.fillRect(i, 0, 40, 40);} g.fillStyle(0xffffff); g.fillRect(0, 0, 850, 4); g.generateTexture('stadium_grass', 850, 40);
        g.clear(); g.fillStyle(0xeab308); g.fillRect(2, 26, 24, 4); g.fillStyle(0xf97316); g.beginPath(); g.moveTo(14, 0); g.lineTo(22, 26); g.lineTo(6, 26); g.closePath(); g.fill(); g.fillStyle(0xffffff); g.fillRect(10, 12, 8, 4); g.generateTexture('cone_hazard', 28, 30);
        g.clear(); g.fillStyle(0x1e293b); g.fillRect(4, 4, 24, 24); g.fillStyle(0xeab308); g.fillRect(8, 10, 16, 4); g.fillStyle(0x22c55e); g.fillCircle(10, 22, 2); g.fillCircle(22, 22, 2); g.fillStyle(0x0f172a); g.fillRect(2, 28, 28, 4); g.generateTexture('patrol_robot', 32, 32);
        g.clear(); g.fillStyle(0xffffff, 0.4); g.fillCircle(20, 20, 15); g.fillCircle(40, 15, 18); g.fillCircle(60, 20, 15); g.fillRect(20, 15, 40, 15); g.generateTexture('neon_cloud', 80, 40);
    }
</script>
</body>
</html>
